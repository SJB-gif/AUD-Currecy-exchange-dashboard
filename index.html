<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#08264a" />
  <title>AUD Exchange Rate Dashboard</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <style>
    :root { --bg:#f7f9fc; --card:#fff; --ink:#0f172a; --muted:#64748b; --border:#d5dde8; --navy:#08264a; --blue:#0b57d0; --red:#e11d25; --green:#0b8f3a; --amber:#b45309; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background:var(--bg); color:var(--ink); }
    .wrap { max-width:1160px; margin:0 auto; padding:18px 12px 32px; }
    .topbar { display:grid; grid-template-columns:48px 1fr 48px; align-items:start; gap:8px; }
    h1 { text-align:center; margin:4px 0; font-size:clamp(1.35rem,4vw,2rem); }
    .sub { text-align:center; color:var(--muted); margin-bottom:16px; font-size:.95rem; }
    .gearBtn { justify-self:end; border:1px solid var(--border); background:white; border-radius:999px; width:42px; height:42px; padding:0; font-size:1.25rem; line-height:1; box-shadow:0 2px 10px rgba(15,23,42,.08); }
    .card { background:var(--card); border:1px solid var(--border); border-radius:10px; box-shadow:0 2px 12px rgba(15,23,42,.08); overflow:hidden; margin-bottom:20px; }
    table { width:100%; border-collapse:collapse; table-layout:fixed; }
    th { background:var(--navy); color:white; padding:12px 8px; font-size:clamp(.84rem,2.5vw,1rem); }
    td { padding:13px 8px; text-align:center; border-top:1px solid var(--border); font-size:clamp(.86rem,2.55vw,1.04rem); }
    .down { color:var(--red); font-weight:800; } .up { color:var(--green); font-weight:800; } .flat { color:var(--muted); font-weight:800; }
    .pair { font-weight:700; }
    .alertBox { margin:0 0 14px; padding:12px 14px; border-radius:10px; border:1px solid var(--border); background:white; line-height:1.35; }
    .alertHigh { border-color:#86efac; background:#ecfdf5; } .alertTrend { border-color:#fcd34d; background:#fffbeb; } .alertQuiet { color:var(--muted); }
    .refreshControl { margin:-8px 0 12px; padding:0 4px; }
    .controls { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:8px; }
    button { border:1px solid var(--border); background:white; border-radius:8px; padding:10px 12px; font-weight:800; color:var(--ink); }
    button.primary { background:var(--navy); color:white; border-color:var(--navy); }
    .status { padding:0 12px 12px; color:var(--muted); font-size:.86rem; line-height:1.35; }
    .chart-card { padding:14px 10px 8px; }
    .chart-title { text-align:center; font-size:clamp(1.05rem,3.5vw,1.45rem); font-weight:900; margin:4px 0 2px; }
    .chart-note { text-align:center; color:var(--muted); font-size:.88rem; margin-bottom:10px; }
    .chart-box { position:relative; height:62vh; min-height:440px; max-height:690px; }
    .scaleControls { display:flex; justify-content:center; gap:8px; padding:10px 0 2px; }
    .scaleControls button { min-width:46px; padding:8px 10px; }
    .scaleControls button.active { background:var(--navy); color:white; border-color:var(--navy); }
    .muted { color:var(--muted); }
    .settingsBackdrop { position:fixed; inset:0; z-index:20; background:rgba(15,23,42,.24); backdrop-filter:blur(4px); opacity:0; pointer-events:none; transition:.18s ease; }
    .settingsBackdrop.open { opacity:1; pointer-events:auto; }
    .settingsPanel { position:fixed; z-index:30; top:0; right:0; height:100dvh; width:min(520px,50vw); background:white; border-left:1px solid var(--border); box-shadow:-8px 0 24px rgba(15,23,42,.22); transform:translateX(105%); transition:.22s ease; display:flex; flex-direction:column; }
    .settingsPanel.open { transform:translateX(0); }
    .settingsHead { display:flex; align-items:center; justify-content:space-between; padding:16px; border-bottom:1px solid var(--border); background:#fbfdff; }
    .settingsHead h2 { margin:0; font-size:1.1rem; }
    .settingsBody { padding:14px; display:grid; gap:14px; overflow:auto; }
    .settingsSection { border:1px solid var(--border); border-radius:10px; padding:12px; background:#fbfdff; display:grid; gap:10px; }
    .currencyGrid { display:grid; grid-template-columns:repeat(auto-fit,minmax(86px,1fr)); gap:6px; }
    label.currency { display:flex; align-items:center; gap:7px; padding:8px; border:1px solid var(--border); border-radius:8px; background:white; font-weight:700; }
    .busyOverlay { position:fixed; inset:0; z-index:40; display:none; align-items:center; justify-content:center; background:rgba(247,249,252,.55); backdrop-filter:blur(3px); }
    .busyOverlay.open { display:flex; }
    .spinner { width:58px; height:58px; border:6px solid #cbd5e1; border-top-color:var(--navy); border-radius:50%; animation:spin .8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    @media (max-width:760px) { .settingsPanel { width:86vw; } th,td { padding-left:4px; padding-right:4px; } .wrap { padding-left:8px; padding-right:8px; } .chart-box { height:68vh; min-height:530px; } }
  </style>
</head>
<body>
<main class="wrap" id="mainContent">
  <div class="topbar">
    <div></div>
    <div>
      <h1>AUD Exchange Rate Dashboard</h1>
      <div class="sub" id="dateLine">Loading rates...</div>
    </div>
    <button class="gearBtn" onclick="openSettings()" aria-label="Open settings">⚙️</button>
  </div>
  <div id="alertArea"></div>

  <section class="card">
    <table aria-label="AUD exchange rate table">
      <thead><tr><th>Pair</th><th>Current rate</th><th>90-day best</th><th>Gap to best</th></tr></thead>
      <tbody id="rateRows"></tbody>
    </table>
    <div class="status" id="status"></div>
  </section>

  <div class="controls refreshControl">
    <button class="primary" onclick="refreshAll(true)">Refresh now</button>
  </div>

  <section class="card chart-card">
    <div class="chart-title">AUD exchange rates over time</div>
    <div class="chart-note" id="chartNote">Three colour-coded Y-axes, one per selected currency.</div>
    <div class="chart-box"><canvas id="rateChart"></canvas></div>
    <div class="scaleControls" aria-label="Chart scale">
      <button id="scaleM" onclick="setChartScale('M')">M</button>
      <button id="scaleW" onclick="setChartScale('W')">W</button>
      <button id="scaleD" onclick="setChartScale('D')">D</button>
      <button id="scaleH" onclick="setChartScale('H')">H</button>
    </div>
  </section>
</main>

<div class="settingsBackdrop" id="settingsBackdrop" onclick="closeSettings()"></div>
<aside class="settingsPanel" id="settingsPanel" aria-label="Settings panel">
  <div class="settingsHead"><h2>Settings</h2><button onclick="closeSettings()">Close</button></div>
  <div class="settingsBody">
    <section class="settingsSection">
      <strong>History tools</strong>
      <div class="controls">
        <button onclick="recordLatestOnly()">Record latest only</button>
        <button onclick="clearHistory()">Clear saved history</button>
        <button onclick="exportHistory()">Export history</button>
        <button onclick="document.getElementById('importFile').click()">Import history</button>
        <input id="importFile" type="file" accept="application/json" style="display:none" onchange="importHistory(event)">
      </div>
    </section>
    <section class="settingsSection">
      <div><strong>Select up to three target currencies</strong> <span class="muted">(AUD is the base)</span></div>
      <div class="currencyGrid" id="currencyChoices"></div>
    </section>
  </div>
</aside>
<div class="busyOverlay" id="busyOverlay"><div class="spinner" aria-label="Refreshing"></div></div>

<script>
const TARGETS = ['CAD','CHF','CNY','DKK','EUR','GBP','HKD','IDR','ISK','JPY','NOK','NZD','SEK','SGD','THB','USD'];
const PALETTE = [
  { name:'blue', colour:'#0b57d0', axis:'y0', position:'left' },
  { name:'red', colour:'#e11d25', axis:'y1', position:'left' },
  { name:'green', colour:'#0b8f3a', axis:'y2', position:'right' }
];
const STORAGE_KEY = 'aud_exchange_dashboard_history_v2';
const SELECTED_KEY = 'aud_exchange_dashboard_selected_v2';
const SCALE_KEY = 'aud_exchange_dashboard_chart_scale_v2';
const API_BASES = ['https://api.frankfurter.dev/v1', 'https://api.frankfurter.app'];
const MAX_HISTORY = 750;
let latest = null, prior7 = null, prior14 = null, selected = loadSelected(), chartScale = localStorage.getItem(SCALE_KEY) || 'H', chart = null, settingsDirty = false;

function isoDate(d = new Date()) { return d.toISOString().slice(0,10); }
function localIsoDate(ms = Date.now()) { const d = new Date(ms); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function prettyDate(s) { return new Date(s + 'T00:00:00').toLocaleDateString(undefined, { day:'numeric', month:'short', year:'numeric' }); }
function addDays(s, days) { const d = new Date(s + 'T00:00:00'); d.setDate(d.getDate()+days); return isoDate(d); }
function decimals(code) { return code === 'JPY' || code === 'ISK' || code === 'IDR' ? 4 : 4; }
function pctGap(current, best) { return ((current - best) / best) * 100; }
function symbols() { return selected.join(','); }
function loadSelected() { const s = JSON.parse(localStorage.getItem(SELECTED_KEY) || 'null'); return Array.isArray(s) && s.length ? s.slice(0,3) : ['DKK','ISK','NOK']; }
function saveSelected() { localStorage.setItem(SELECTED_KEY, JSON.stringify(selected)); }
function normaliseStoredRecord(r) { if (!r || typeof r.date !== 'string' || typeof r.rates !== 'object') return null; const fetchedAt = r.fetchedAt || (r.date + 'T12:00:00.000Z'); return { date:r.date, fetchedAt, rates:r.rates }; }
function recordTimeMs(r) { const raw = r?.fetchedAt || (r?.date ? r.date + 'T12:00:00.000Z' : null); const ms = raw ? Date.parse(raw) : NaN; return Number.isFinite(ms) ? ms : 0; }
function sortHistory(history) { return history.map(normaliseStoredRecord).filter(Boolean).sort((a,b) => recordTimeMs(a)-recordTimeMs(b)); }
function loadHistory() { return sortHistory(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]')); }
function saveHistory(history) { localStorage.setItem(STORAGE_KEY, JSON.stringify(sortHistory(history).slice(-MAX_HISTORY))); }

function renderCurrencyChoices() { const box = document.getElementById('currencyChoices'); box.innerHTML=''; for (const code of TARGETS) { const checked = selected.includes(code) ? 'checked' : ''; box.insertAdjacentHTML('beforeend', `<label class="currency"><input type="checkbox" value="${code}" ${checked} onchange="toggleCurrency(this)">${code}</label>`); } }
function toggleCurrency(cb) { const code = cb.value; if (cb.checked && selected.length >= 3) { cb.checked=false; alert('Select up to three currencies only.'); return; } selected = cb.checked ? [...selected, code] : selected.filter(c => c !== code); if (!selected.length) { cb.checked=true; selected=[code]; alert('Keep at least one currency selected.'); } saveSelected(); settingsDirty = true; }
function openSettings() { renderCurrencyChoices(); document.getElementById('settingsBackdrop').classList.add('open'); document.getElementById('settingsPanel').classList.add('open'); }
async function closeSettings() { document.getElementById('settingsBackdrop').classList.remove('open'); document.getElementById('settingsPanel').classList.remove('open'); if (settingsDirty) { settingsDirty = false; showBusy(true); await refreshAll(false); showBusy(false); } }
function showBusy(on) { document.getElementById('busyOverlay').classList.toggle('open', !!on); }

async function fetchJsonWithFallback(path) { let lastError=null; for (const base of API_BASES) { try { const res = await fetch(`${base}${path}`, { cache:'no-store' }); if (!res.ok) throw new Error(`${res.status} ${res.statusText}`); return await res.json(); } catch(err) { lastError=err; } } throw new Error(`Failed to fetch exchange-rate data. Last error: ${lastError?.message || lastError}`); }
async function fetchRates(date = null) { const path = date ? `/${date}?from=AUD&to=${symbols()}` : `/latest?from=AUD&to=${symbols()}`; return await fetchJsonWithFallback(path); }
async function fetchCurrentAndBest() { const current = await fetchRates(); const endPrevious = addDays(current.date, -1); const start = addDays(current.date, -90); const hist = await fetchJsonWithFallback(`/${start}..${endPrevious}?from=AUD&to=${symbols()}`); const best = {}; for (const code of selected) best[code] = { rate:-Infinity, date:null }; for (const [date, rates] of Object.entries(hist.rates || {})) { for (const code of selected) if (rates[code] != null && rates[code] > best[code].rate) best[code] = { rate:rates[code], date }; } return { date:current.date, rates:current.rates, best }; }
async function getPriorRates(currentDate, days) { return (await fetchRates(addDays(currentDate, -days))).rates; }

function previousDifferentStoredRate(code, current) { const history = loadHistory().filter(r => typeof r.rates?.[code] === 'number'); const eps = 1e-12; for (let i = history.length - 1; i >= 0; i--) { const v = history[i].rates[code]; if (Math.abs(v - current) > eps) return v; } return current; }
function movementIndicator(current, prior) { if (prior == null || !Number.isFinite(prior)) return '<span class="flat">⚪ →</span>'; if (current > prior) return '<span class="up">🟢 ↑</span>'; if (current < prior) return '<span class="down">🔴 ↓</span>'; return '<span class="flat">⚪ →</span>'; }
function renderTable(data) { const rows = document.getElementById('rateRows'); rows.innerHTML=''; selected.forEach(code => { const current = data.rates[code]; const prior = previousDifferentStoredRate(code, current); const best = data.best[code]?.rate; const direction = movementIndicator(current, prior); const gap = best && isFinite(best) ? pctGap(current, best) : 0; rows.insertAdjacentHTML('beforeend', `<tr><td class="pair">AUD → ${code}</td><td>${direction} ${current.toFixed(decimals(code))} ${code}</td><td>${isFinite(best) ? best.toFixed(decimals(code)) + ' ' + code : 'n/a'}</td><td class="${gap >= 0 ? 'up' : 'down'}">${gap.toFixed(2)}%</td></tr>`); }); }
function renderAlerts(data) { const highs=[], trends=[]; for (const code of selected) { const current=data.rates[code], best=data.best[code]?.rate, p7=prior7?.[code], p14=prior14?.[code]; if (best && current > best) highs.push({ code, previous:best, now:current, improvement:((current-best)/best)*100 }); else if (best && p7 && p14) { const gap=((best-current)/best)*100; if (gap <= .75 && current > p7 && p7 > p14) trends.push({ code, gap }); } } let html=''; if (highs.length) html += `<div class="alertBox alertHigh"><strong>🚨 New 90-day high:</strong> ${highs.map(h => `AUD → ${h.code}: previous best ${h.previous.toFixed(decimals(h.code))}, new rate ${h.now.toFixed(decimals(h.code))}, improvement +${h.improvement.toFixed(2)}%`).join(' · ')}</div>`; if (trends.length) html += `<div class="alertBox alertTrend"><strong>📈 Excellent trend / peaking:</strong> ${trends.map(t => `AUD → ${t.code} is rising for two checks and is only ${t.gap.toFixed(2)}% below its 90-day best`).join(' · ')}</div>`; if (!html) html='<div class="alertBox alertQuiet">No new 90-day highs or peaking signals detected for the selected currencies.</div>'; document.getElementById('alertArea').innerHTML=html; }

function axisRange(values, padRatio=.25) { const nums = values.filter(v => typeof v === 'number' && isFinite(v)); if (!nums.length) return { min:0, max:1 }; const min=Math.min(...nums), max=Math.max(...nums); const span=max-min || Math.abs(max)*.01 || 1; return { min:min-span*padRatio, max:max+span*padRatio }; }
function upsertHistory(date, rates) { const history = loadHistory(); history.push({ date, fetchedAt:new Date().toISOString(), rates:{ ...rates } }); saveHistory(history); return loadHistory(); }
function beginningOfLocalDay(ms) { const d = new Date(ms); return new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime(); }
function beginningOfLocalWeek(ms) { const d = new Date(ms); const day = d.getDay(); return new Date(d.getFullYear(), d.getMonth(), d.getDate() - day).getTime(); }
function beginningOfLocalMonth(ms) { const d = new Date(ms); return new Date(d.getFullYear(), d.getMonth(), 1).getTime(); }
function averageGroup(records, bucketFn) { const groups = new Map(); for (const r of records) { const key = bucketFn(recordTimeMs(r)); if (!groups.has(key)) groups.set(key, []); groups.get(key).push(r); } return [...groups.entries()].map(([bucket, items]) => { const rates = {}; for (const code of selected) rates[code] = items.reduce((sum, r) => sum + r.rates[code], 0) / items.length; return { date: localIsoDate(Number(bucket)), fetchedAt: new Date(Number(bucket)).toISOString(), rates }; }).sort((a,b) => recordTimeMs(a)-recordTimeMs(b)); }
function chooseHourlyWindow(records, nowMs) { const windows = [6, 8, 24]; for (const hours of windows) { const cutoff = nowMs - hours*60*60*1000; const filtered = records.filter(r => recordTimeMs(r) >= cutoff); if (filtered.length >= 2) return { hours, records: filtered }; } const cutoff = nowMs - 24*60*60*1000; return { hours:24, records: records.filter(r => recordTimeMs(r) >= cutoff) }; }
function chartHistory() { const records = loadHistory().filter(r => selected.every(code => typeof r.rates?.[code] === 'number')); const nowMs = records.length ? recordTimeMs(records[records.length-1]) : Date.now(); if (chartScale === 'H') return chooseHourlyWindow(records, nowMs).records; if (chartScale === 'D') return averageGroup(records.filter(r => recordTimeMs(r) >= nowMs - 10*24*60*60*1000), beginningOfLocalDay); if (chartScale === 'W') return averageGroup(records.filter(r => recordTimeMs(r) >= nowMs - 3*7*24*60*60*1000), beginningOfLocalWeek); return averageGroup(records.filter(r => recordTimeMs(r) >= nowMs - 92*24*60*60*1000), beginningOfLocalMonth); }
function chartXRange(history) { const nowMs = history.length ? recordTimeMs(history[history.length-1]) : Date.now(); if (chartScale === 'H') { const chosen = chooseHourlyWindow(loadHistory().filter(r => selected.every(code => typeof r.rates?.[code] === 'number')), nowMs); return { min: nowMs - chosen.hours*60*60*1000, max: nowMs, label: `hourly view: last ${chosen.hours} hours` }; } if (chartScale === 'D') return { min: beginningOfLocalDay(nowMs - 10*24*60*60*1000), max: nowMs, label:'daily view: last 10 days, averaged by day' }; if (chartScale === 'W') return { min: beginningOfLocalWeek(nowMs - 3*7*24*60*60*1000), max: nowMs, label:'weekly view: last 3 weeks, averaged by week' }; return { min: beginningOfLocalMonth(nowMs - 92*24*60*60*1000), max: nowMs, label:'monthly view: last 3 months, averaged by month' }; }
function tickLabel(value) { const d = new Date(value); if (chartScale === 'H') return d.toLocaleString(undefined, { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' }); if (chartScale === 'D') return d.toLocaleDateString(undefined, { day:'numeric', month:'short' }); if (chartScale === 'W') return 'Wk ' + d.toLocaleDateString(undefined, { day:'numeric', month:'short' }); return d.toLocaleDateString(undefined, { month:'short', year:'2-digit' }); }
function setChartScale(scale) { chartScale=scale; localStorage.setItem(SCALE_KEY, scale); renderChart(); if (latest) renderTable(latest); }
function updateScaleButtons() { ['M','W','D','H'].forEach(s => { const b=document.getElementById('scale'+s); if (b) b.classList.toggle('active', chartScale===s); }); }
function renderChart() { const history = chartHistory(); const ctx = document.getElementById('rateChart'); if (chart) chart.destroy(); updateScaleButtons(); const xr = chartXRange(history); document.getElementById('chartNote').textContent = `${xr.label} · ` + selected.map((c,i)=>`${PALETTE[i].name} ${c}`).join(', ') + ' · each currency uses its own Y-axis.'; if (!history.length) return; const scales = { x:{ type:'linear', min:xr.min, max:xr.max, grid:{ color:'#d7dde6' }, ticks:{ callback:v => tickLabel(v), font:{ weight:'700' }, maxRotation:45, minRotation:0 } } }; selected.forEach((code,i) => { const p=PALETTE[i], range=axisRange(history.map(r => r.rates[code])); scales[p.axis] = { type:'linear', position:p.position, offset:i===1, min:range.min, max:range.max, ticks:{ color:p.colour, callback:v => Number(v).toFixed(decimals(code)), font:{ weight:'800' } }, title:{ display:true, text:`AUD → ${code}`, color:p.colour, font:{ weight:'900' } }, grid:{ drawOnChartArea:i===0, color:'#d7dde6' } }; }); chart = new Chart(ctx, { type:'line', data:{ datasets:selected.map((code,i) => { const p=PALETTE[i]; return { label:`AUD → ${code}`, data:history.map(r => ({ x:recordTimeMs(r), y:r.rates[code] })), borderColor:p.colour, backgroundColor:p.colour, yAxisID:p.axis, tension:.25, pointRadius:4, pointHoverRadius:7, borderWidth:3 }; }) }, options:{ responsive:true, maintainAspectRatio:false, parsing:false, interaction:{ mode:'nearest', intersect:false }, plugins:{ legend:{ position:'bottom' }, tooltip:{ callbacks:{ title:items => items.length ? new Date(items[0].parsed.x).toLocaleString() : '', label:ctx => `${ctx.dataset.label}: ${ctx.parsed.y.toFixed(4)}` } } }, scales } }); }

async function refreshAll(autoRecord=true) { try { document.getElementById('status').textContent='Fetching current, prior-fortnight, and previous 90-day data...'; latest = await fetchCurrentAndBest(); prior7 = await getPriorRates(latest.date, 7); prior14 = await getPriorRates(latest.date, 14); document.getElementById('dateLine').textContent = `Latest fetch: ${new Date().toLocaleString()} · Rate date: ${prettyDate(latest.date)} · Source: Frankfurter reference rates`; renderTable(latest); renderAlerts(latest); if (autoRecord) upsertHistory(latest.date, latest.rates); renderChart(); document.getElementById('status').textContent = `The table shows the latest fetched rates. The current-rate indicator compares against the most recent previous stored value that was different. History is auto-sorted by fetchedAt and saved locally. Graph views use a linear time axis: H auto-selects 6/8/24 hours, D/W/M aggregate averages by day/week/month.`; } catch(err) { document.getElementById('status').textContent = `Error: ${err.message}. Check network/API access and try Refresh now.`; console.error(err); } }
async function recordLatestOnly() { if (!latest) await refreshAll(false); upsertHistory(latest.date, latest.rates); renderChart(); document.getElementById('status').textContent = `Recorded ${prettyDate(latest.date)} in local browser history.`; }
function clearHistory() { if (!confirm('Clear all locally saved exchange-rate history?')) return; localStorage.removeItem(STORAGE_KEY); renderChart(); document.getElementById('status').textContent='Local history cleared.'; }
function exportHistory() { const blob = new Blob([JSON.stringify(loadHistory(), null, 2)], { type:'application/json' }); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='aud-exchange-history.json'; a.click(); URL.revokeObjectURL(a.href); }
function normaliseImportedHistory(raw) { if (!Array.isArray(raw)) throw new Error('Import file must contain a JSON array.'); const cleaned=[]; for (const item of raw) { if (!item || typeof item.date !== 'string' || !/^\d{4}-\d{2}-\d{2}$/.test(item.date) || typeof item.rates !== 'object') continue; const rates={}; for (const [code,value] of Object.entries(item.rates)) { const n=Number(value); if (/^[A-Z]{3}$/.test(code) && Number.isFinite(n) && n>0) rates[code]=n; } if (Object.keys(rates).length) cleaned.push({ date:item.date, fetchedAt:item.fetchedAt || item.date + 'T12:00:00.000Z', rates }); } if (!cleaned.length) throw new Error('No valid history records were found in the file.'); const all=[...loadHistory(), ...cleaned]; const dedup=new Map(); for (const r of all) dedup.set((r.fetchedAt || r.date) + JSON.stringify(r.rates), r); return sortHistory([...dedup.values()]).slice(-MAX_HISTORY); }
async function importHistory(event) { const file=event.target.files?.[0]; event.target.value=''; if (!file) return; try { const text=await file.text(); const imported=normaliseImportedHistory(JSON.parse(text)); saveHistory(imported); renderChart(); document.getElementById('status').textContent = `Imported history successfully. Stored ${imported.length} total records locally in this browser.`; } catch(err) { document.getElementById('status').textContent = `Import failed: ${err.message}`; } }

renderCurrencyChoices(); refreshAll(true);
</script>
</body>
</html>
